name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'images/**'
      - 'index.html'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Publish build to repository root
        run: |
          cp dist/index.html index.html
          rm -rf assets images
          cp -r dist/assets assets
          cp -r dist/images images
          touch .nojekyll

      - name: Commit and push deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets images .nojekyll
          if git diff --staged --quiet; then
            echo "No deployment changes to commit."
            exit 0
          fi
          git commit -m "chore: deploy built site to GitHub Pages"
          git push
